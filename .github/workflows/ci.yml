name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Dart SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.0'

      - name: Install dependencies
        run: |
          case $RUNNER_OS in
            'Linux')
              make linux-prepare
              ;;
            'Windows')
              make windows-prepare
              ;;
            'macOS')
              make macos-prepare
              ;;
            *)
              echo "Unsupported OS"
              exit 1
              ;;
          esac

      - name: Run Flutter tests
        run: flutter test

      - name: Build APK
        run: |
          flutter build apk

      - name: Build iOS app
        run: |
          flutter build ios

      - name: Build macOS app
        run: |
          flutter build macos

      - name: Build Windows app
        run: |
          flutter build windows



