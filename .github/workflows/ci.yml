name: Flutter CI

on:
  push:
    branches:
      - main  # 或你要监控的分支
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest  # 选择适合的操作系统

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.4.0'  # 指定你的 Flutter 版本

      - name: Prepare dependencies for Windows
        if: runner.os == 'Windows'
        run: make windows-prepare

      - name: Prepare dependencies for Android
        if: runner.os == 'Linux'  # 根据你的需要
        run: make android-prepare

      - name: Run Flutter project
        run: flutter run

      - name: Build APK
        run: flutter build apk

      - name: Build Windows application
        if: runner.os == 'Windows'
        run: flutter build windows

      - name: Upload APK Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v3
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk  # 根据实际路径调整

      - name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v3
        with:
          name: windows
          path: build/windows/runner/Release/YourApp.exe  # 根据实际路径调整
