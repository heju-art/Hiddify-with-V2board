name: Build and Package

on:
  push:
    branches:
      - main  # 触发工作流的分支

jobs:
  build:
    runs-on: ubuntu-latest  # 在 Ubuntu 环境中运行

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.0'  # 指定 Flutter 版本

      - name: Prepare dependencies for Android
        run: |
          sudo apt-get update
          sudo apt-get install -y make
          make android-prepare

      - name: Prepare dependencies for Windows
        run: |
          sudo apt-get update
          sudo apt-get install -y make
          make windows-prepare

      - name: Run Flutter project
        run: flutter run

      - name: Build APK for Android
        run: flutter build apk

      - name: Build for Windows
        run: flutter build windows

      - name: Output application
        run: |
          echo "Build complete. Check the build outputs."


